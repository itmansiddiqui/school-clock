<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>School Clock</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: Arial, Helvetica, sans-serif;
        background: #0b1c2d; /* Navy blue */
        color: white;
        overflow: hidden;
    }

    body::before {
        content: "";
        position: absolute;
        inset: 0;
        background: url("school-logo.png") center no-repeat;
        background-size: 50%;
        opacity: 0.12; /* watermark strength */
        z-index: 0;
    }

    .container {
        position: relative;
        z-index: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .time {
        font-size: clamp(90px, 15vw, 210px);
        font-weight: bold;
        letter-spacing: 2px;
    }

    .date {
        font-size: clamp(32px, 5vw, 60px);
        margin-top: 20px;
        opacity: 0.9;
    }
</style>
</head>

<body>
<div class="container">
    <div class="time" id="time">00:00:00</div>
    <div class="date" id="date">Loading...</div>
</div>

<script>
function updateClock() {
    const now = new Date();

    // Force UK (London) time regardless of device settings
    const time = new Intl.DateTimeFormat('en-GB', {
        timeZone: 'Europe/London',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
    }).format(now);

    const date = new Intl.DateTimeFormat('en-GB', {
        timeZone: 'Europe/London',
        weekday: 'long',
        day: 'numeric',
        month: 'long',
        year: 'numeric'
    }).format(now);

    document.getElementById('time').textContent = time;
    document.getElementById('date').textContent = date;
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
